name: Deploy React to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER: poc-dev
      ECS_SERVICE: poc-react-dev
      TASK_DEFINITION: poc-react-task
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build React and push to ECR
      id: build-image
      run: |
        # Generate timestamp INSIDE bash (✅ This works!)
        IMAGE_TAG=$(date +%d%m%Y%H%M%S)
        ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
        FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
        
        echo "Generated timestamp: $IMAGE_TAG"
        echo "Building image: $FULL_IMAGE"
        
        # Build React
        npm ci
        npm run build
        
        # Dockerfile for Vite
        cat > Dockerfile << EOF
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
        EOF
        
        # Build & push
        docker build --no-cache -t "$FULL_IMAGE" .
        docker push "$FULL_IMAGE"
        
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
        echo "✅ Image pushed successfully!"

    - name: Update ECS task definition
      id: task-def
      run: |
        aws ecs describe-task-definition \
          --task-definition poc-react-task \
          --query 'taskDefinition.{family:family,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory,containerDefinitions:containerDefinitions}' > task-def.json
        
        IMAGE_URI="${{ steps.build-image.outputs.image }}"
        jq '.containerDefinitions[0].image = $image' \
          --arg image "$IMAGE_URI" task-def.json > task-def-updated.json
        
        TASK_ARN=$(aws ecs register-task-definition \
          --cli-input-json "$(cat task-def-updated.json)" \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        
        echo "task-definition=$TASK_ARN" >> $GITHUB_OUTPUT

    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Show deployment success
      run: |
        echo "🎉 REACT APP DEPLOYED SUCCESSFULLY!"
        echo "✅ Timestamp tag: $(date +%d%m%Y%H%M%S)"
        echo "✅ Image: ${{ steps.build-image.outputs.image }}"
        echo "✅ Check ALB DNS for live React app!"
