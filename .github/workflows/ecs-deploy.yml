name: dev-ui-deployment

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  dev-ui:
    runs-on: ubuntu-latest
    
    env:
      ECR_REPO: poc-react
      ECS_CLUSTER: poc-dev
      ECS_SERVICE: poc-dev-ui
      TASK_FAMILY: poc-dev-ui
      CONTAINER_NAME: dev-ui

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        role-session-name: poc-dev-deploy
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      id: build-ui
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build React app (your Dockerfile is perfect)
        docker build -t ui:latest .
        
        # Tag with unique SHA (like original project: ui-$IMAGE_TAG)
        FULL_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPO }}:ui-$IMAGE_TAG"
        docker tag ui:latest $FULL_IMAGE
        
        # Push ONLY unique tag (skip latest - ECR immutable)
        docker push $FULL_IMAGE
        
        # Output for ECS deployment
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the ECS task definition
      id: task-def-ui
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.TASK_FAMILY }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-ui.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def-ui.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
