name: Deploy React to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER: poc-dev
      ECS_SERVICE: poc-react-dev
      TASK_DEFINITION: poc-react-task
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build React and push to ECR
      id: build-image
      run: |
        IMAGE_TAG=$(date +%d%m%Y%H%M%S)
        ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
        FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
        
        echo "Generated timestamp: $IMAGE_TAG"
        echo "Building image: $FULL_IMAGE"
        
        npm ci
        npm run build
        
        cat > Dockerfile << EOF
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
        EOF
        
        docker build --no-cache -t "$FULL_IMAGE" .
        docker push "$FULL_IMAGE"
        
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

    - name: Update ECS task definition
      id: task-def
      run: |
        # Get current task definition JSON
        aws ecs describe-task-definition --task-definition poc-react-task > full-task.json
        
        # Extract ONLY registerable fields, handle null values
        cat > task-def.json << 'EOF'
        {
          "family": "poc-react-task",
          "networkMode": "awsvpc",
          "requiresCompatibilities": ["FARGATE"],
          "cpu": "256",
          "memory": "512",
          "executionRoleArn": "arn:aws:iam::254475702305:role/ecsTaskExecutionRole"
        }
        EOF
        
        # Add container definition with new image
        IMAGE_URI="${{ steps.build-image.outputs.image }}"
        CONTAINER_JSON=$(jq -n \
          --arg image "$IMAGE_URI" \
          --arg name "poc-react-container" \
          '[{name: $name, image: $image, essential: true, portMappings: [{containerPort: 80, hostPort: 80}], logConfiguration: {logDriver: "awslogs", options: { "awslogs-group": "/ecs/poc-react-task", "awslogs-region": "ap-south-1", "awslogs-stream-prefix": "ecs" }}}]')
        
        jq ".containerDefinitions = $CONTAINER_JSON" task-def.json > task-def-final.json
        
        # Register new task definition
        TASK_ARN=$(aws ecs register-task-definition \
          --cli-input-json "$(cat task-def-final.json)" \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        
        echo "task-definition=$TASK_ARN" >> $GITHUB_OUTPUT
        echo "✅ New task definition: $TASK_ARN"

    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Show deployment success
      run: |
        echo "🎉 REACT APP FULLY DEPLOYED!"
        echo "✅ Timestamp: $(date +%d%m%Y%H%M%S)"
        echo "✅ Image: ${{ steps.build-image.outputs.image }}"
        echo "✅ Service: poc-react-dev (1/1 running)"
        echo "👉 Your React app is LIVE on ALB DNS!"
