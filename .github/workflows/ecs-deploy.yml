name: Deploy React to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push React App
      run: |
        # Timestamp tag (ddmmyyyyhhmmss)
        IMAGE_TAG=$(date +%d%m%Y%H%M%S)
        ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        ECR_REPO="${{ secrets.ECR_REPOSITORY }}"
        FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
        
        echo "Building: $FULL_IMAGE"
        
        # Build React + Docker
        npm ci && npm run build
        
        cat > Dockerfile << EOF
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
        EOF
        
        docker build --no-cache -t "$FULL_IMAGE" .
        docker push "$FULL_IMAGE"
        
        echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

    - name: Deploy to ECS (SIMPLEST METHOD)
      run: |
        aws ecs update-service \
          --cluster poc-dev \
          --service poc-react-dev \
          --force-new-deployment \
          --region ${{ secrets.AWS_REGION }}
        
        echo "✅ ECS Service redeployed - pulling new image!"
        echo "✅ New image: $FULL_IMAGE"
        
        # Wait for deployment
        for i in {1..20}; do
          STATUS=$(aws ecs describe-services \
            --cluster poc-dev \
            --services poc-react-dev \
            --query 'services[0].deployments[0].status' \
            --output text --region ${{ secrets.AWS_REGION }})
          
          echo "Deployment status: $STATUS ($i/20)"
          if [ "$STATUS" = "ACTIVE" ]; then
            echo "✅ Deployment ACTIVE!"
            break
          fi
          sleep 30
        done

    - name: Final Status
      run: |
        echo "🎉 REACT APP LIVE!"
        echo "Image: $FULL_IMAGE"
        echo "Service: poc-react-dev in poc-dev cluster"
        echo "Check ALB DNS → React app ready! 🚀"
