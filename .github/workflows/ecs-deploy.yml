name: dev-ui-deployment

on:
  workflow_dispatch:  # Manual trigger (change to `push: branches: [main]` for auto-deploy)
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  dev-ui:
    runs-on: ubuntu-latest
    
    env:
      ECR_REPO: poc-react              # ← Your ECR repo from Step 1
      ECS_CLUSTER: poc-dev  # ← Your cluster from Step 2
      ECS_SERVICE: poc-dev-ui   # ← Your service from Step 4
      CONTAINER_NAME: dev-ui      # ← From your task definition container name

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::254475702305:role/github-actions #${{ secrets.AWS_ROLE_ARN }}     # ← Your GitHub IAM role ARN
        role-session-name: poc-dotnet-deploy
        aws-region: ap-south-1 #${{ secrets.AWS_REGION }}           # ← ap-south-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract metadata (tags, labels, sha)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}

    - name: Build and push Docker image
      id: build-ui
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}  # Use commit SHA as tag
      run: |
        # Build from root (or change to 'cd ui' if React app in subfolder)
        docker build -t ui:latest .
        docker tag ui:latest $ECR_REGISTRY/$ECR_REPO:ui-$IMAGE_TAG
        docker tag ui:latest $ECR_REGISTRY/$ECR_REPO:latest
        docker push $ECR_REGISTRY/$ECR_REPO:ui-$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPO:latest
        echo "image=$ECR_REGISTRY/$ECR_REPO:ui-$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the ECS task definition
      id: task-def-ui
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: poc-dev-ui # ← Your task family name from Step 3
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-ui.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def-ui.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
