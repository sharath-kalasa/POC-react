name: Deploy React to ECS

on:
  workflow_dispatch:        # Manual trigger button
  push:
    branches: [ main ]

permissions:
  id-token: write          # OIDC authentication
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Use your GitHub secrets directly
    env:
      AWS_REGION: ${{ secrets.aws_region }}           # ap-south-1
      ECR_REPOSITORY: ${{ secrets.ecr_repository }}   # poc-react-dev
      ECS_CLUSTER: poc-dev
      ECS_SERVICE: poc-react-dev
      TASK_DEFINITION: poc-react-task
      
    steps:
    # 1. Checkout your React code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configure AWS credentials using your GitHub role
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.aws_role_arn }}    # Your GitHub Actions IAM role
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GitHubActions-React-Deploy

    # 3. Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Build React app + Docker + Push to ECR
    - name: Build React and push to ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Install dependencies and build React
        npm ci
        npm run build
        
        # Create production Dockerfile (nginx serves React build)
        cat > Dockerfile << EOF
        FROM nginx:alpine
        COPY build /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
        EOF
        
        # Build and push Docker image
        docker build -t \$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG .
        docker push \$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG
        
        echo "image=\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG" >> \$GITHUB_OUTPUT

    # 5. Download current task definition + update image
    - name: Update ECS task definition
      id: task-def
      run: |
        # Download existing task definition
        aws ecs describe-task-definition \
          --task-definition \$TASK_DEFINITION \
          --query taskDefinition > task-def.json
        
        # Update container image to new ECR image
        IMAGE_URI="\$(echo '${{ steps.build-image.outputs.image }}' | sed 's/\//\\\//g')"
        sed -i "s|\"image\": \".*\"|\"image\": \"$IMAGE_URI\"|" task-def.json
        
        # Register new task definition revision
        TASK_ARN=\$(aws ecs register-task-definition \
          --cli-input-json file://task-def.json \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        
        echo "task-definition=\$TASK_ARN" >> \$GITHUB_OUTPUT

    # 6. Deploy new task definition to ECS service
    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # 7. Show success URL (your ALB DNS)
    - name: Show deployment URL
      run: |
        echo "✅ React app deployed successfully!"
        echo "Check your ALB DNS name for the live app"
        aws elbv2 describe-load-balancers \
          --names poc-react-alb \
          --query 'LoadBalancers[0].DNSName' \
          --output text || echo "Find ALB DNS in ECS console"
