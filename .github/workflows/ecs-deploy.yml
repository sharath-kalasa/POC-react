name: Deploy React to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER: poc-dev
      ECS_SERVICE: poc-react-dev
      TASK_DEFINITION: poc-react-task
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build React and push to ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        npm ci
        npm run build
        
        cat > Dockerfile << EOF
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
        EOF
        
        FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
        echo "Building image: $FULL_IMAGE"
        
        docker build --no-cache -t "$FULL_IMAGE" .
        docker push "$FULL_IMAGE"
        
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

    - name: Update ECS task definition
      id: task-def
      run: |
        aws ecs describe-task-definition \
          --task-definition poc-react-task \
          --query taskDefinition > task-def.json
        
        IMAGE_URI="${{ steps.build-image.outputs.image }}"
        sed -i "s|\"image\": \".*\"|\"image\": \"$IMAGE_URI\"|" task-def.json
        
        TASK_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://task-def.json \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        echo "task-definition=$TASK_ARN" >> $GITHUB_OUTPUT

    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
